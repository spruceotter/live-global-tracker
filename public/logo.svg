<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Orbital ring (outer) -->
  <ellipse cx="256" cy="256" rx="230" ry="80" transform="rotate(-25 256 256)" stroke="url(#grad1)" stroke-width="2.5" opacity="0.4"/>
  <!-- Orbital ring (inner) -->
  <ellipse cx="256" cy="256" rx="180" ry="60" transform="rotate(15 256 256)" stroke="url(#grad2)" stroke-width="2" opacity="0.3"/>
  <!-- Globe circle -->
  <circle cx="256" cy="256" r="120" stroke="url(#grad1)" stroke-width="3" opacity="0.8"/>
  <!-- Globe meridian lines -->
  <ellipse cx="256" cy="256" rx="60" ry="120" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="256" cy="256" rx="100" ry="120" stroke="url(#grad1)" stroke-width="1" opacity="0.2"/>
  <!-- Globe latitude lines -->
  <ellipse cx="256" cy="220" rx="110" ry="20" stroke="url(#grad1)" stroke-width="1" opacity="0.2"/>
  <ellipse cx="256" cy="290" rx="105" ry="18" stroke="url(#grad1)" stroke-width="1" opacity="0.2"/>
  <!-- Data pulse dot -->
  <circle cx="310" cy="200" r="8" fill="#60a5fa">
    <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Secondary dot -->
  <circle cx="200" cy="300" r="5" fill="#a78bfa" opacity="0.7">
    <animate attributeName="r" values="4;7;4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Tertiary dot -->
  <circle cx="350" cy="280" r="4" fill="#34d399" opacity="0.6">
    <animate attributeName="r" values="3;6;3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
</svg>
